<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Webcam Stream</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: #1a1a24;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h2 { margin-bottom: 20px; font-weight: 600; color: #3b82f6; }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #2d2d3d;
            border-radius: 8px;
            background: #0f0f12;
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        input:focus { border-color: #3b82f6; outline: none; }
        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        .video-box {
            margin-top: 20px;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .status { margin-top: 15px; font-size: 14px; color: #a1a1aa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Live Device Monitor</h2>
    
    <div id="setup-view">
        <input type="text" id="modelInput" placeholder="Enter Device Model (e.g. RMX3870)" />
        <br>
        <button onclick="connectToStream()">Watch Live Stream</button>
    </div>

    <div class="video-box">
        <div id="placeholder-text" style="color: #666;">No Stream Active</div>
        <img id="liveStream" alt="Live Feed" />
    </div>
    
    <div class="status" id="statusText">Enter device model to connect.</div>
</div>

<script>
    let ws;
    let streamImg = document.getElementById('liveStream');
    let placeholder = document.getElementById('placeholder-text');
    let statusText = document.getElementById('statusText');

    function connectToStream() {
        const modelNumber = document.getElementById('modelInput').value.trim();
        if (!modelNumber) {
            alert("Please enter a valid model number!");
            return;
        }

        // Auto detect protocol (ws:// or wss://)
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUrl = protocol + window.location.host;

        if (ws) ws.close();

        ws = new WebSocket(wsUrl);
        ws.binaryType = 'blob'; // Imp: Receive video frames as binary blobs

        ws.onopen = () => {
            statusText.innerText = "Connecting to device...";
            // Register as viewer for specific model
            ws.send(JSON.stringify({
                type: 'register_viewer',
                deviceModel: modelNumber
            }));
        };

        ws.onmessage = (event) => {
            // Buffer Handle mapping
            if (event.data instanceof Blob) {
                // Agar binary blob (Image Frame) hai to image render karo
                const url = URL.createObjectURL(event.data);
                
                // Memory leak se bachne ke liye purana object URL revoke karein
                const oldUrl = streamImg.src;
                streamImg.src = url;
                streamImg.style.display = 'block';
                placeholder.style.display = 'none';
                
                if (oldUrl.startsWith('blob:')) {
                    URL.revokeObjectURL(oldUrl);
                }
            } else {
                // Agar text status messages hain
                const json = JSON.parse(event.data);
                if (json.status === "connected") {
                    statusText.innerHTML = `🟢 Streaming Live from <b style="color:#10b981">${modelNumber.toUpperCase()}</b>`;
                } else if (json.status === "error" || json.status === "offline") {
                    statusText.innerHTML = `🔴 ${json.message}`;
                    streamImg.style.display = 'none';
                    placeholder.style.display = 'block';
                }
            }
        };

        ws.onclose = () => {
            statusText.innerText = "Connection lost. Reconnecting options ready.";
        };
    }

    // 5-Minute Auto Refresh Loop to clear heavy cache and keep it fresh
    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            console.log("5 Minute safety reload triggered for clean memory.");
            connectToStream();
        }
    }, 5 * 60 * 1000); // 5 minutes in milliseconds
</script>

</body>
</html>
