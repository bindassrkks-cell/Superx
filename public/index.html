<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Live Device Monitor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0B0B0F;
            color: #E4E4E7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Glassmorphism Card Container */
        .card {
            width: 100%;
            max-width: 480px;
            background: #12121A;
            border: 1px solid #232330;
            border-radius: 24dp;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #3B82F6;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #71717A;
            margin-bottom: 25px;
        }

        /* Form Group Control */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #A1A1AA;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #232330;
            border-radius: 12px;
            background: #181824;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        input:focus {
            border-color: #3B82F6;
            background: #1C1C2B;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3B82F6;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button:hover {
            background: #2563EB;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }

        /* Live Video Monitoring Viewport */
        #stream-view {
            display: none; /* Initial State Hidden */
        }

        .video-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2D2D3F;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-loader {
            color: #52525B;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Status Badge Indicators */
        .status-badge {
            background: #181824;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #A1A1AA;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: 1px solid #232330;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #71717A;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.blink {
            background: #10B981;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="auth-view">
            <h2>Device Gateway</h2>
            <div class="subtitle">Enter hardware identifier to sync terminal</div>
            
            <div class="form-group">
                <label for="modelInput">Hardware Model Number</label>
                <input type="text" id="modelInput" value="RMX3870" placeholder="e.g. RMX3870" autocomplete="off" />
            </div>
            
            <button onclick="connectToStream()">Establish Stream Connection</button>
        </div>

        <div id="stream-view">
            <h2 id="displayModel">RMX3870 Feed</h2>
            <div class="subtitle">Low Latency Hardware Stream Tunnel</div>

            <div class="video-container">
                <div id="placeholder-text" class="placeholder-loader">
                    <span>Waiting for pipeline packet data...</span>
                </div>
                <img id="liveStream" alt="Live Transmission Stream" />
            </div>

            <div class="status-badge">
                <span id="statusDot" class="dot"></span>
                <span id="statusText">Initializing Channel...</span>
            </div>
        </div>
    </div>

<script>
    let ws;
    const authView = document.getElementById('auth-view');
    const streamView = document.getElementById('stream-view');
    const displayModel = document.getElementById('displayModel');
    const streamImg = document.getElementById('liveStream');
    const placeholder = document.getElementById('placeholder-text');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    function connectToStream() {
        const modelNumber = document.getElementById('modelInput').value.trim();
        if (!modelNumber) {
            alert("Please provide a valid device signature model.");
            return;
        }

        // State Transformation Transition
        authView.style.display = "none";
        streamView.style.display = "block";
        displayModel.innerText = `${modelNumber.toUpperCase()} Live Feed`;
        statusText.innerText = "Connecting to tunnel route...";

        // Target Secure Production Socket Pipeline
        const wsUrl = "wss://superx-oje2.onrender.com";

        if (ws) {
            ws.close();
        }

        ws = new WebSocket(wsUrl);
        ws.binaryType = 'blob'; // Enforce binary mode for compressed JPEG arrays

        ws.onopen = () => {
            statusText.innerText = "Registering handshake down-link...";
            ws.send(JSON.stringify({
                type: 'register_viewer',
                deviceModel: modelNumber
            }));
        };

        ws.onmessage = (event) => {
            if (event.data instanceof Blob) {
                // Instantly render image payload matrix
                const url = URL.createObjectURL(event.data);
                const oldUrl = streamImg.src;
                streamImg.src = url;
                streamImg.style.display = 'block';
                placeholder.style.display = 'none';
                
                // Clear active object caches to maintain 0% local memory bloat
                if (oldUrl.startsWith('blob:')) {
                    URL.revokeObjectURL(oldUrl);
                }
            } else {
                const json = JSON.parse(event.data);
                if (json.status === "connected") {
                    statusDot.className = "dot blink";
                    statusText.innerHTML = `Connected Securely | <span style="color:#10B981; font-weight:bold;">LIVE</span>`;
                } else if (json.status === "offline") {
                    statusDot.className = "dot";
                    statusText.innerText = "Device Idle / Offline Packet Received";
                    streamImg.style.display = 'none';
                    placeholder.style.display = 'flex';
                }
            }
        };

        ws.onerror = (err) => {
            console.error("Pipeline failure:", err);
            statusDot.className = "dot";
            statusText.innerText = "Tunnel Link Error. Re-evaluating routing.";
        };

        ws.onclose = () => {
            statusDot.className = "dot";
            statusText.innerText = "Session Closed. Refresh page to bypass.";
        };
    }
</script>
</body>
</html>
