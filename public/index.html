<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Webcam Stream</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f0f12; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            width: 90%; max-width: 500px; text-align: center;
            background: #1a1a24; padding: 25px; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h2 { margin-bottom: 20px; color: #3b82f6; }
        input {
            width: 80%; padding: 12px; border: 2px solid #2d2d3d;
            border-radius: 8px; background: #0f0f12; color: #fff;
            font-size: 16px; text-align: center; margin-bottom: 15px; text-transform: uppercase;
        }
        button {
            padding: 12px 24px; background: #3b82f6; color: white;
            border: none; border-radius: 8px; font-size: 16px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        .video-box {
            margin-top: 20px; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .status { margin-top: 15px; font-size: 14px; color: #a1a1aa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Live Device Monitor</h2>
    
    <div id="setup-view">
        <input type="text" id="modelInput" value="RMX3870" placeholder="Enter Device Model" />
        <br>
        <button onclick="connectToStream()">Watch Live Stream</button>
    </div>

    <div class="video-box">
        <div id="placeholder-text" style="color: #666;">No Stream Active</div>
        <img id="liveStream" alt="Live Feed" />
    </div>
    
    <div class="status" id="statusText">Ready to connect...</div>
</div>

<script>
    let ws;
    const streamImg = document.getElementById('liveStream');
    const placeholder = document.getElementById('placeholder-text');
    const statusText = document.getElementById('statusText');

    function connectToStream() {
        const modelNumber = document.getElementById('modelInput').value.trim();
        if (!modelNumber) {
            alert("Model number dalna zaroori hai!");
            return;
        }

        statusText.innerText = "Connecting to tunnel...";

        // Render standard secure socket enforcement
        const wsUrl = "wss://superx-oje2.onrender.com";

        if (ws) {
            ws.close();
        }

        ws = new WebSocket(wsUrl);
        ws.binaryType = 'blob';

        ws.onopen = () => {
            statusText.innerText = "Registering viewer channel...";
            ws.send(JSON.stringify({
                type: 'register_viewer',
                deviceModel: modelNumber
            }));
        };

        ws.onmessage = (event) => {
            if (event.data instanceof Blob) {
                const url = URL.createObjectURL(event.data);
                const oldUrl = streamImg.src;
                streamImg.src = url;
                streamImg.style.display = 'block';
                placeholder.style.display = 'none';
                
                if (oldUrl.startsWith('blob:')) {
                    URL.revokeObjectURL(oldUrl);
                }
            } else {
                const json = JSON.parse(event.data);
                if (json.status === "connected") {
                    statusText.innerHTML = `🟢 Live: <b style="color:#10b981">${modelNumber.toUpperCase()}</b>`;
                } else if (json.status === "offline") {
                    statusText.innerHTML = `🔴 App Closed/Disconnected`;
                    streamImg.style.display = 'none';
                    placeholder.style.display = 'block';
                }
            }
        };

        ws.onerror = (err) => {
            console.error("WS Error: ", err);
            statusText.innerText = "Connection Error. Retrying...";
        };

        ws.onclose = () => {
            statusText.innerText = "Tunnel Closed. Press Watch again.";
        };
    }
</script>
</body>
</html>
